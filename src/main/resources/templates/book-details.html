<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Book Details')}"></head>
<body class="page-body">
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
<main class="main">
    <a class="back-link" th:href="@{/books}">Back to Books</a>

    <div th:if="${error}" class="error-msg" th:text="${error}">Error</div>
    <div th:if="${message}" class="hint" th:text="${message}">Message</div>

    <div class="card w-96" th:if="${book != null}">
        <h1 class="font-bold mb-5" th:text="${book.title}">Book Title</h1>

        <dl class="detail-list">
            <div class="detail-row">
                <dt class="detail-key">ID</dt>
                <dd th:text="${book.id}">id</dd>
            </div>
            <div class="detail-row">
                <dt class="detail-key">Author</dt>
                <dd th:text="${book.author}">Author</dd>
            </div>
            <div class="detail-row">
                <dt class="detail-key">Themes</dt>
                <dd th:text="${#strings.listJoin(book.themes, ', ')}">Themes</dd>
            </div>
            <div class="detail-row">
                <dt class="detail-key">Reading Level</dt>
                <dd th:text="${book.readingLevel}">Reading level</dd>
            </div>
        </dl>

        <p class="mt-6"><a class="link" th:href="@{'/books/' + ${book.id} + '/edit'}">Edit reading level</a></p>
    </div>
</main>
<div th:replace="~{fragments/chat-widget :: chatWidget(${chatStarters}, ${chatRedirectPath}, ${chatBookId})}"></div>
</body>
</html>
