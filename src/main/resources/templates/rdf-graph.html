<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('RDF Graph')}"></head>
<body class="page-body">
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
<main class="main">
    <a class="back-link" th:href="@{/rdf/upload}">Back to RDF Upload</a>
    <h1 class="page-title mb-2">RDF Graph Visualization</h1>
    <p class="muted mb-6" th:text="${'Uploaded file: ' + fileName}">Uploaded file</p>

    <div class="card overflow-x-auto" th:utext="${graphSvg}"></div>
</main>
<div th:replace="~{fragments/chat-widget :: chatWidget(${chatStarters}, ${chatRedirectPath}, ${chatBookId})}"></div>
</body>
</html>
