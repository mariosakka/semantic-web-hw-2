<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Book')}"></head>
<body class="page-body">
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
<main class="main">
    <a class="back-link" th:href="@{'/books/' + ${book.id}}">Back to Book Details</a>
    <h1 class="page-title mb-6">Edit Reading Level</h1>

    <div th:if="${book != null}">
        <p class="muted mb-6">
            <span th:text="${book.title}">Book title</span>
            <span> by </span>
            <span th:text="${book.author}">Author</span>
        </p>

        <form class="form" th:action="@{'/books/' + ${book.id} + '/edit'}" method="post">
            <div>
                <label class="label" for="readingLevel">New Reading Level</label>
                <select class="select w-80" id="readingLevel" name="readingLevel" required>
                    <option th:each="level : ${readingLevels}" th:value="${level}" th:text="${level}" th:selected="${level == book.readingLevel}">Level</option>
                </select>
            </div>
            <button type="submit" class="btn mt-4">Save</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/chat-widget :: chatWidget(${chatStarters}, ${chatRedirectPath}, ${chatBookId})}"></div>
</body>
</html>
