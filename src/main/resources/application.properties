server.port=8080
spring.application.name=semantic-web-book-rag

spring.config.import=optional:file:.env[.properties]

openai.api.key=${OPENAI_API_KEY}
openai.chat.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
openai.embedding.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

elasticsearch.url=${ELASTICSEARCH_URL:http://localhost:9200}
elasticsearch.index=${ELASTICSEARCH_INDEX:book_chunks}

app.rdf.demo-path=/app/data/books.rdf
app.graph.output-dir=/app/generated/graphs
